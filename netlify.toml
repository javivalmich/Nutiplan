# netlify.toml — NutiPlan deployment config
# Handles SPA routing + correct headers for AdSense assets

[build]
  publish = "dist"          # Vite default; change to "build" for CRA
  command = "npm run build"

# ── SPA fallback: all unknown routes serve index.html ──────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── ads.txt must be served at the ROOT domain, not a sub-path ──────────────
# Netlify serves files from /public (or /dist) at root automatically.
# This header rule ensures the correct Content-Type.
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type  = "text/plain"
    Cache-Control = "public, max-age=86400"  # cache 24h

# ── AdSense JS — allow from Google's CDN ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Permissive CSP that allows AdSense. Tighten in production as needed.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagservices.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googlesyndication.com;"
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
